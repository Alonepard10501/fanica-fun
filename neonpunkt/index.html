<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>NeonPunkt</title>
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NeonPunkt">
<style>
  /* NeonPunkt Web — ein Punkt, 48 Stunden, keine Gnade. (Web-Fassung der Android-App, gleiche Regeln) */
  html, body { margin: 0; padding: 0; background: #000; height: 100%; overflow: hidden;
               -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
               font-family: -apple-system, "Segoe UI", Roboto, sans-serif; }
  #logo { position: fixed; inset: 0; margin: auto; max-width: 90vw; max-height: 90vh;
          opacity: 0.22; pointer-events: none; }
  #start { position: fixed; inset: 0; display: flex; flex-direction: column;
           align-items: center; justify-content: center; gap: 28px; }
  #start p { color: #fff; font-size: 20px; margin: 0; }
  #startKnopf { background: #6750a4; color: #fff; border: none; border-radius: 36px;
                height: 72px; padding: 0 44px; font-size: 29px; cursor: pointer; }
  #startKnopf:active { filter: brightness(1.25); }
  #feld { position: fixed; inset: 0; display: none; }
  /* Punkt-Leinwand liegt UEBER der Klick-/Zeitanzeige (Punkt immer oben, immer klickbar) */
  #leinwand { position: relative; z-index: 2; }
  #zaehler { position: fixed; top: calc(env(safe-area-inset-top, 0px) + 12px); left: 0; right: 0;
             text-align: center; color: rgba(255,255,255,0.8); pointer-events: none; }
  #zaehler .k { font-size: 14px; }
  #zaehler .z { font-size: 12px; }
</style>

<div id="start">
  <p>Spiel dauert 48 Stunden</p>
  <button id="startKnopf">Start</button>
  <p>au&szlig;er du klickst auf den Punkt</p>
</div>
<div id="feld">
  <canvas id="leinwand"></canvas>
  <div id="zaehler"><div class="k" id="klickText">Klicks: 0</div><div class="z" id="zeitText"></div></div>
</div>
<script>
"use strict";
// ---------------------------------------------------------------------------
// Regeln wie in der Android-App:
//   r(t) = r0 + (rMax - r0) * min(t / 172800 s, 1)   — Wanduhr, nie inkrementell
//   Tipp auf den Punkt: naechste Neonfarbe, neue Position, Punkt-Uhr von vorn,
//   Klickzaehler laeuft weiter. Ist der Punkt voll (48 h), beendet EIN weiterer
//   Tipp irgendwo die Session. Zustand ueberlebt Neustart (localStorage).
// ---------------------------------------------------------------------------
var DAUER_S = 172800;
var R0 = 12;
var FARBEN = ["#39FF14","#FF10F0","#00FFFF","#FFFF00","#FF9F00","#BC13FE","#FF3131","#1F51FF",
              "#ADFF2F","#00FF7F","#7DF9FF","#FF6EC7","#FFD300","#00BFFF","#6F00FF","#FF4D6D"];
var P = "neonpunkt.";
function lies(k, std) { var v = localStorage.getItem(P + k); return v === null ? std : v; }
function schreib(k, v) { localStorage.setItem(P + k, "" + v); }

var start = document.getElementById("start"), feld = document.getElementById("feld");
var lw = document.getElementById("leinwand"), ctx = lw.getContext("2d");
var klickText = document.getElementById("klickText"), zeitText = document.getElementById("zeitText");

var z = null;   // Session-Zustand
function laden() {
  if (lies("aktiv", "0") !== "1") return null;
  return { sessionStart: +lies("sessionStart", Date.now()),
           punktStart:   +lies("punktStart", Date.now()),
           klicks:       +lies("klicks", 0),
           farbe:        +lies("farbe", 0),
           posX:         +lies("posX", 0.5),
           posY:         +lies("posY", 0.5) };
}
function speichern() {
  schreib("aktiv", "1");
  schreib("sessionStart", z.sessionStart); schreib("punktStart", z.punktStart);
  schreib("klicks", z.klicks); schreib("farbe", z.farbe);
  schreib("posX", z.posX); schreib("posY", z.posY);
}
function sessionEnde() {
  ["aktiv","sessionStart","punktStart","klicks","farbe","posX","posY"].forEach(function(k){ localStorage.removeItem(P + k) });
  z = null; feld.style.display = "none"; start.style.display = "flex";
}

document.getElementById("startKnopf").addEventListener("click", function () {
  var jetzt = Date.now();
  z = { sessionStart: jetzt, punktStart: jetzt, klicks: 0, farbe: 0,
        posX: Math.random(), posY: Math.random() };
  speichern();
  start.style.display = "none"; feld.style.display = "block";
});

function groesse() { lw.width = innerWidth * devicePixelRatio; lw.height = innerHeight * devicePixelRatio;
                     lw.style.width = innerWidth + "px"; lw.style.height = innerHeight + "px"; }
addEventListener("resize", groesse); groesse();

function radius(t) {
  var rMax = Math.hypot(innerWidth, innerHeight) / 2;
  var f = Math.min(Math.max((t - z.punktStart) / 1000 / DAUER_S, 0), 1);
  return R0 + (rMax - R0) * f;
}
// Mittelpunkt bleibt im sichtbaren Bereich (Punkt immer klickbar); ist der Kreis
// groesser als der Bildschirm, wandert er in die Mitte (wie in der App).
function achse(rel, r, laenge) {
  var u = r, o = laenge - r;
  if (u > o) return laenge / 2;
  return Math.min(Math.max(rel * laenge, u), o);
}
function punktVoll(t) { return (t - z.punktStart) >= DAUER_S * 1000; }

feld.addEventListener("pointerdown", function (ev) {
  if (!z) return;
  var nun = Date.now();
  if (punktVoll(nun)) { sessionEnde(); return }     // EIN Tipp irgendwo beendet die volle Session
  var r = radius(nun);
  var cx = achse(z.posX, r, innerWidth), cy = achse(z.posY, r, innerHeight);
  var treffer = Math.hypot(ev.clientX - cx, ev.clientY - cy) <= Math.max(r, 24);
  if (!treffer) return;
  z.klicks += 1;
  z.farbe = (z.farbe + 1) % FARBEN.length;
  z.posX = Math.random(); z.posY = Math.random();
  z.punktStart = nun;
  speichern();
});

function malen() {
  requestAnimationFrame(malen);
  if (!z) return;
  var d = devicePixelRatio, jetzt = Date.now();
  ctx.clearRect(0, 0, lw.width, lw.height);
  var r = radius(jetzt);
  var cx = achse(z.posX, r, innerWidth) * d, cy = achse(z.posY, r, innerHeight) * d, rp = r * d;
  var farbe = FARBEN[z.farbe];
  var glow = ctx.createRadialGradient(cx, cy, 0, cx, cy, rp * 1.6);
  glow.addColorStop(0, farbe + "8C");      // 55 % Deckkraft
  glow.addColorStop(1, "rgba(0,0,0,0)");
  ctx.fillStyle = glow;
  ctx.beginPath(); ctx.arc(cx, cy, rp * 1.6, 0, 7); ctx.fill();
  ctx.fillStyle = farbe;
  ctx.beginPath(); ctx.arc(cx, cy, rp, 0, 7); ctx.fill();
  // Zaehler oben (sekundengenau seit Session-Start)
  var s = Math.max(0, Math.floor((jetzt - z.sessionStart) / 1000));
  var w = Math.floor(s / 604800), t2 = Math.floor(s % 604800 / 86400),
      h = Math.floor(s % 86400 / 3600), m = Math.floor(s % 3600 / 60), sk = s % 60;
  function n2(x) { return (x < 10 ? "0" : "") + x }
  klickText.textContent = "Klicks: " + z.klicks;
  zeitText.textContent = w + " W " + t2 + " T " + n2(h) + " Std " + n2(m) + " Min " + n2(sk) + " Sek";
}

z = laden();
if (z) { start.style.display = "none"; feld.style.display = "block" }
malen();
</script>
